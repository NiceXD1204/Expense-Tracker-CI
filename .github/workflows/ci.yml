name: CI

on:
  pull_request:
    branches: [master]

jobs:
  ci:
    uses: ./.github/workflows/_reusable-ci.yml

  notify-on-failure:
    needs: [ci]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: ":x: *CI failed* for PR #${{ github.event.number }}\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.head_ref }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Workflow:* ${{ github.workflow }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
