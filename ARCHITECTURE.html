<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Expense Tracker DevOps Project — Architecture Mind Map</title>

<style>
  :root {
    --bg: #0f1117;
    --panel: #161925;
    --border: #2a2f42;
    --text: #e6e8f0;
    --muted: #8b90a8;
    --accent: #7dd3fc;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  #toolbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    box-sizing: border-box;
    z-index: 10;
  }
  #toolbar h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
    color: var(--text);
    letter-spacing: 0.2px;
    display: inline;
  }
  #toolbar .sub {
    font-size: 12px;
    color: var(--muted);
    margin-left: 10px;
    font-weight: 400;
  }
  #controls {
    display: flex;
    gap: 8px;
  }
  #controls button {
    background: #1f2333;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  #controls button:hover {
    background: #262b40;
    border-color: var(--accent);
  }
  .markmap {
    position: fixed;
    top: 56px;
    left: 0;
    width: 100vw;
    height: calc(100vh - 56px);
    background: var(--bg);
  }
  .markmap svg {
    display: block;
    width: 100%;
    height: 100%;
    background: var(--bg);
  }

  /* Markmap node/link styling overrides */
  .markmap-node > circle {
    fill: var(--bg);
    stroke-width: 2px;
  }
  .markmap-node text {
    fill: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .markmap-link {
    fill: none;
  }
</style>
</head>
<body>

<div id="toolbar">
  <div>
    <h1>Expense Tracker DevOps Project</h1><span class="sub">Interactive Architecture Mind Map</span>
  </div>
  <div id="controls">
    <button id="btn-fit">Fit to Screen</button>
    <button id="btn-expand">Expand All</button>
    <button id="btn-collapse">Collapse All</button>
  </div>
</div>

<div class="markmap">
<script type="text/template">
# Expense Tracker DevOps Project

## App Architecture
- Frontend: React + Vite (served by nginx, port 80)
- Backend: FastAPI (port 8000)
- Database: PostgreSQL 16 (port 5432)
- Local Dev: Docker Compose

## Infrastructure (IaC)
- Cloud: AWS (eu-central-1)
- Provisioning: Terraform (reusable module, S3 state)
- Orchestration: Amazon EKS
- Networking: VPC & NAT Gateway
- Registry: Amazon ECR
- Load Balancing: Ingress-Nginx

## CI/CD & GitOps
- Workflows: GitHub Actions
- GitOps: ArgoCD
- Packaging: Helm Charts
- Deployment Pattern: App of Apps
- Strategy: GitHub Flow (protected master)

## Application Features
- Data Isolation: User / Household
- Security: JWT & bcrypt hashing
- Collaboration: Shared Household Account
- Internationalization: i18n & RTL support

## Monitoring & Observability
- Stack: kube-prometheus-stack
- Metrics: Prometheus
- Visualization: Grafana
- Alerting: Alertmanager to Slack

## Cost Management
- Strategy: Session-based clusters
- Procedure: Morning setup / Evening teardown
- Resource Type: 2x t3.medium spot worker nodes
- Automation: Terraform destroy

## Repositories
- Expense-Tracker-CI (App Code & Charts)
- Expense-Tracker-CD (Infra & GitOps)
</script>
</div>

<script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@0.16"></script>

<script>
  // markmap-autoloader renders the .markmap div asynchronously and stores the
  // Markmap instance on the generated <svg>'s `.mm` property. Poll briefly
  // until it's available, then wire up the toolbar buttons to it.
  (function () {
    const fitBtn = document.getElementById('btn-fit');
    const expandBtn = document.getElementById('btn-expand');
    const collapseBtn = document.getElementById('btn-collapse');

    function foldAll(node, fold) {
      if (node.children && node.children.length) {
        if (node.payload) node.payload.fold = fold;
        node.children.forEach((child) => foldAll(child, fold));
      }
    }

    function wire(mm) {
      fitBtn.addEventListener('click', () => mm.fit());

      expandBtn.addEventListener('click', () => {
        const root = mm.state.data;
        foldAll(root, 0);
        mm.setData(root);
        mm.fit();
      });

      collapseBtn.addEventListener('click', () => {
        const root = mm.state.data;
        root.children && root.children.forEach((child) => foldAll(child, 1));
        mm.setData(root);
        mm.fit();
      });
    }

    function tryWire(attemptsLeft) {
      const svg = document.querySelector('.markmap svg');
      if (svg && svg.mm) {
        wire(svg.mm);
        return;
      }
      if (attemptsLeft <= 0) {
        // Autoloader instance wasn't reachable — hide the custom buttons and
        // rely on markmap's built-in zoom/pan/click-to-collapse behavior.
        expandBtn.style.display = 'none';
        collapseBtn.style.display = 'none';
        fitBtn.style.display = 'none';
        return;
      }
      setTimeout(() => tryWire(attemptsLeft - 1), 150);
    }

    window.addEventListener('load', () => tryWire(20));
  })();
</script>

</body>
</html>
